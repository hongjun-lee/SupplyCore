<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SupplyCore 静态演示原型</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="系统菜单">
      <div class="brand">
        <div class="brand-mark">SC</div>
        <div>
          <div class="brand-title">SupplyCore</div>
          <div class="brand-subtitle">物资供应管理系统</div>
        </div>
      </div>
      <nav class="nav-tree" id="navTree"></nav>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button" id="menuToggle" aria-label="切换菜单">
            <span></span><span></span><span></span>
          </button>
          <div>
            <div class="page-kicker">辽宁能源集团 / 阜新矿业集团</div>
            <h1 id="pageTitle">工作台</h1>
          </div>
        </div>
        <div class="topbar-right">
          <div class="global-search">搜索单号、物料、合同、接口任务</div>
          <div class="top-pill">待办 <strong>18</strong></div>
          <div class="top-pill warn">异常 <strong>6</strong></div>
          <div class="user-chip">
            <span class="avatar">李</span>
            <span>李宏军</span>
          </div>
        </div>
      </header>

      <main class="content">
        <section id="pageHost" class="page-host"></section>
      </main>
    </div>
  </div>

  <div class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-panel">
      <div class="drawer-head">
        <div>
          <div class="page-kicker">详情摘要</div>
          <h2 id="drawerTitle">单据详情</h2>
        </div>
        <button class="ghost-button" id="drawerClose">关闭</button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
    </div>
  </div>

  <script src="./scripts/app.js"></script>
</body>
</html>
